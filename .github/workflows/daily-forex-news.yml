name: Daily Forex News Update

on:
  schedule:
    # 01:10 UTC = 09:10 UTC+8
    - cron: '10 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    services:
      deeplx:
        image: ghcr.io/owo-network/deeplx:latest
        ports:
          - 1188:1188
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update forex news data
        env:
          DEEPLX_URL: http://127.0.0.1:1188/translate
        run: npm run news:update

      - name: Commit updated news data
        run: |
          if git diff --quiet -- src/data/forex-news.json; then
            echo "No news data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/forex-news.json
          git commit -m "chore: update daily forex news"
          git push

