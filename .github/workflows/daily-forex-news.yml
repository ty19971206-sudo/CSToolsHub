name: Daily Forex News Update

on:
  schedule:
    # Primary schedule: 01:10 UTC = 09:10 UTC+8
    - cron: '10 1 * * *'
    # Fallback schedule in case GitHub schedule is delayed/missed
    - cron: '40 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    concurrency:
      group: daily-forex-news
      cancel-in-progress: false
    runs-on: ubuntu-latest
    services:
      deeplx:
        image: ghcr.io/owo-network/deeplx:latest
        ports:
          - 1188:1188
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for DeepLX
        run: |
          for i in $(seq 1 30); do
            if curl -sf -X POST http://127.0.0.1:1188/translate \
              -H 'Content-Type: application/json' \
              -d '{"text":"ping","source_lang":"EN","target_lang":"ZH"}' >/dev/null; then
              echo "DeepLX ready"
              exit 0
            fi
            sleep 2
          done
          echo "DeepLX did not become ready in time"
          exit 1

      - name: Update forex news data
        env:
          DEEPLX_URL: http://127.0.0.1:1188/translate
        run: npm run news:update

      - name: Commit updated news data
        run: |
          if git diff --quiet -- src/data/forex-news.json; then
            echo "No news data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/forex-news.json
          git commit -m "chore: update daily forex news"
          git push

